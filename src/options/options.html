<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoftBlock - Domains</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <p class="eyebrow">Digital pause</p>
        <h1>SoftBlock</h1>
        <p>Choose the sites you want to review calmly before entering.</p>
      </header>

      <section class="card">
        <label for="domainInput">Add domain</label>
        <div class="row">
          <input id="domainInput" type="text" placeholder="e.g. youtube.com" autocomplete="off" />
          <button id="addDomainButton" type="button">Save</button>
        </div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>

      <section class="card">
        <label for="cooldownSecondsInput">Continue cooldown (seconds)</label>
        <div class="row">
          <input id="cooldownSecondsInput" type="number" min="0" max="60" step="1" />
          <button id="saveCooldownButton" type="button">Save cooldown</button>
        </div>
        <p class="hint">This controls how long the Continue button stays locked in the blocking popup.</p>
      </section>

      <section class="card">
        <h2>Blocked domains</h2>
        <ul id="domainList" class="domain-list"></ul>
      </section>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
