<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoftBlock - Dominios</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <p class="eyebrow">Pausa digital</p>
        <h1>SoftBlock</h1>
        <p>Define los sitios que quieres revisar con calma antes de entrar.</p>
      </header>

      <section class="card">
        <label for="domainInput">Agregar dominio</label>
        <div class="row">
          <input id="domainInput" type="text" placeholder="ej: youtube.com" autocomplete="off" />
          <button id="addDomainButton" type="button">Guardar</button>
        </div>
        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Dominios bloqueados</h2>
        <ul id="domainList" class="domain-list"></ul>
      </section>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
